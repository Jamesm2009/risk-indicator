name: Update Dashboard Data

on:
  schedule:
    # Runs at 21:30 UTC = 5:30 PM ET, Monday–Friday (after US market close)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run update script
        run: python update_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update dashboard data $(date +'%Y-%m-%d')"
          git push
